name: SettleEase
options:
  bundleIdPrefix: com.settleease
  deploymentTarget:
    iOS: "26.0"
packages:
  SettleEaseIOS:
    path: .
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  SettleEase:
    type: application
    platform: iOS
    sources:
      - path: XcodeApp
    info:
      path: XcodeApp/Info.plist
    dependencies:
      - package: SettleEaseIOS
        product: SettleEaseAppSource
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.settleease.personal
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  SettleEase:
    build:
      targets:
        SettleEase: all
    run:
      config: Debug
    test:
      config: Debug
