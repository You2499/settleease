name: SettleEase
options:
  bundleIdPrefix: com.settleease
  deploymentTarget:
    iOS: "26.0"
packages:
  SettleEaseIOS:
    path: .
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: "NO"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
    ENABLE_DEBUG_DYLIB: "NO"
targets:
  SettleEase:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: XcodeApp
        excludes:
          - IconSource
    info:
      path: XcodeApp/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
    dependencies:
      - package: SettleEaseIOS
        product: SettleEaseAppSource
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.settleease.personal
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  SettleEase:
    build:
      targets:
        SettleEase: all
    run:
      config: Release
    test:
      config: Debug
